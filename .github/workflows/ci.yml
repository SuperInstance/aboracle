name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pytest
        run: pip install pytest
      - name: Syntax check
        run: |
          find . -name "*.py" -not -path "./.git/*" -exec python3 -m py_compile {} +
      - name: Run tests
        run: python3 -m pytest tests/ -v
